<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Emotion Classroom - Student Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #4e73df, #1cc88a, #36b9cc, #2e59d9);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.register-card {
    width: 420px;
    padding: 45px;
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    color: white;
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(-30px);}
    to {opacity: 1; transform: translateY(0);}
}

.title {
    text-align: center;
    margin-bottom: 35px;
}

/* Line Input Style */
.input-group {
    position: relative;
    margin-bottom: 30px;
}

.form-control {
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(255,255,255,0.6);
    border-radius: 0;
    color: white;
    padding: 10px 35px;
    transition: 0.3s;
}

.form-control:focus {
    background: transparent;
    box-shadow: none;
    border-bottom: 2px solid #ffffff;
}

/* Floating Labels */
.input-group label {
    position: absolute;
    left: 35px;
    top: 10px;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    transition: 0.3s;
    pointer-events: none;
}

.form-control:focus + label,
.form-control:not(:placeholder-shown) + label {
    top: -15px;
    font-size: 12px;
    color: #ffffff;
}

/* Icons */
.icon-left {
    position: absolute;
    left: 5px;
    top: 12px;
    color: white;
}

.toggle-password {
    position: absolute;
    right: 5px;
    top: 12px;
    cursor: pointer;
    color: white;
}

/* Button */
.btn-register {
    border-radius: 50px;
    height: 45px;
    font-weight: 600;
    background: linear-gradient(90deg, #ffffff, #f3f3f3);
    color: #1cc88a;
    border: none;
    transition: 0.4s;
}

.btn-register:hover {
    background: linear-gradient(90deg, #1cc88a, #4e73df);
    color: white;
    transform: scale(1.05);
}

.extra-links {
    text-align: center;
    margin-top: 20px;
}

.extra-links a {
    color: white;
    font-size: 14px;
    text-decoration: none;
}

.extra-links a:hover {
    text-decoration: underline;
}

/* Password Strength */
.strength {
    font-size: 12px;
    margin-top: -20px;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="register-card">

    <div class="title">
        <h3>🎓 Student Registration</h3>
        <p>Create your account</p>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="input-group">
            <i class="fas fa-user icon-left"></i>
            <input type="text" name="username" class="form-control" placeholder=" " required>
            <label>Username</label>
        </div>

        <div class="input-group">
            <i class="fas fa-envelope icon-left"></i>
            <input type="email" name="email" class="form-control" placeholder=" " required>
            <label>Email</label>
        </div>

        <div class="input-group">
            <i class="fas fa-lock icon-left"></i>
            <input type="password" name="password" id="password" class="form-control" placeholder=" " required>
            <label>Password</label>
            <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
        </div>

        <div class="strength" id="strengthText"></div>

        <div class="input-group">
            <i class="fas fa-lock icon-left"></i>
            <input type="password" name="confirm_password" id="confirmPassword" class="form-control" placeholder=" " required>
            <label>Confirm Password</label>
            <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
        </div>

        <button type="submit" class="btn btn-register w-100">Register</button>
    </form>

    <div class="extra-links">
        <a href="{% url 'login' %}">Already have an account?</a>
    </div>

</div>

<script>
function togglePassword(id) {
    const field = document.getElementById(id);
    if (field.type === "password") {
        field.type = "text";
    } else {
        field.type = "password";
    }
}

/* Password Strength Checker */
const passwordInput = document.getElementById("password");
const strengthText = document.getElementById("strengthText");

passwordInput.addEventListener("input", function() {
    const value = passwordInput.value;
    if (value.length < 6) {
        strengthText.textContent = "Weak Password";
        strengthText.style.color = "red";
    } else if (value.match(/[A-Z]/) && value.match(/[0-9]/)) {
        strengthText.textContent = "Strong Password";
        strengthText.style.color = "lightgreen";
    } else {
        strengthText.textContent = "Medium Strength";
        strengthText.style.color = "orange";
    }
});
</script>

</body>
</html>
