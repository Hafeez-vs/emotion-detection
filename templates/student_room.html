<!DOCTYPE html>
<html>
<head>
    <title>Student Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body { background: #121212; color: white; text-align: center; }
        video { border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<h2>🎓 {{ classroom.title }} </h2>

<button id="micBtn"
        style="padding:8px 16px; margin:10px; font-size:14px;">
    🎤 Mute
</button>

<div id="videoContainer" style="
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:30px;
"></div>

<script>

const classroomId = "{{ classroom.id }}";
const username = "{{ request.user.username }}";

const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";

const socket = new WebSocket(
    protocol + window.location.host + "/ws/classroom/" + classroomId + "/"
);

const videoContainer = document.getElementById("videoContainer");

let localStream;
let peerConnection;

const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" },

        {
            urls: "turn:openrelay.metered.ca:80",
            username: "openrelayproject",
            credential: "openrelayproject"
        },
        {
            urls: "turn:openrelay.metered.ca:443",
            username: "openrelayproject",
            credential: "openrelayproject"
        }
    ],
    iceTransportPolicy: "relay"
};

let isSocketOpen = false;
let isCameraReady = false;

// 🎥 1️⃣ Start Camera FIRST
navigator.mediaDevices.getUserMedia({ video: true, audio: true })
.then(stream => {

    console.log("🎥 Camera started");

    localStream = stream;
    isCameraReady = true;

    const wrapper = document.createElement("div");
    wrapper.innerHTML = "<h4>🟢 " + username + " (You)</h4>";

    const video = document.createElement("video");
    video.autoplay = true;
    video.muted = true;
    video.playsInline = true;
    video.width = 300;
    video.srcObject = stream;

    wrapper.appendChild(video);
    videoContainer.appendChild(wrapper);

    tryJoin();  // 🔥 attempt join after camera ready
})
.catch(err => {
    console.error("Camera error:", err);
});

// 🌐 2️⃣ WebSocket events
socket.onopen = () => {
    console.log("✅ WebSocket connected");
    isSocketOpen = true;
    tryJoin();  // 🔥 attempt join after socket ready
};

socket.onerror = (err) => {
    console.error("❌ WebSocket error:", err);
};

socket.onclose = () => {
    console.log("⚠ WebSocket closed");
};

// 🔥 JOIN ONLY WHEN BOTH READY
function tryJoin() {
    if (isSocketOpen && isCameraReady) {
        console.log("🚀 Sending join");

        socket.send(JSON.stringify({
            type: "join",
            sender: username
        }));
    }
}

// 📡 3️⃣ Handle messages
socket.onmessage = async function(event) {

    const data = JSON.parse(event.data);
    console.log("📩 Received:", data.type, data.sender);

    if (data.type === "offer") {

        if (!localStream) {
            console.log("⏳ Camera not ready yet");
            return;
        }

        if (peerConnection) {
            console.log("⚠ Already connected");
            return;
        }

        peerConnection = new RTCPeerConnection(config);

        // Add tracks
        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });

        // Receive teacher video
        peerConnection.ontrack = event => {

            let video = document.getElementById("teacherVideo");

            if (!video) {
                const wrapper = document.createElement("div");
                wrapper.innerHTML = "<h4>👩‍🏫 Teacher</h4>";

                video = document.createElement("video");
                video.id = "teacherVideo";
                video.autoplay = true;
                video.playsInline = true;
                video.width = 300;

                wrapper.appendChild(video);
                videoContainer.appendChild(wrapper);
            }

            video.srcObject = event.streams[0];
        };

        // ICE
        peerConnection.onicecandidate = event => {
            if (event.candidate) {
                socket.send(JSON.stringify({
                    type: "candidate",
                    candidate: event.candidate,
                    sender: username
                }));
            }
        };

        // Set offer
        await peerConnection.setRemoteDescription(
            new RTCSessionDescription(data.offer)
        );
        await new Promise(resolve => setTimeout(resolve, 500));

        // Create answer
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        socket.send(JSON.stringify({
            type: "answer",
            answer: answer,
            sender: username
        }));
    }

    // ICE from teacher
    if (data.type === "candidate" && peerConnection) {
        try {
            await peerConnection.addIceCandidate(
                new RTCIceCandidate(data.candidate)
            );
        } catch (e) {
            console.log("ICE error:", e);
        }
    }
};

// 🎤 Mic toggle
const micBtn = document.getElementById("micBtn");

let isMuted = false;

micBtn.onclick = () => {

    if (!localStream) return;

    localStream.getAudioTracks().forEach(track => {
        track.enabled = isMuted;
    });

    isMuted = !isMuted;

    micBtn.innerText = isMuted ? "🔊 Unmute" : "🎤 Mute";
};

</script>
</body>
</html>
