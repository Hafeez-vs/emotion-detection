<!DOCTYPE html>
<html>
<head>
    <title>Teacher Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            background: #111;
            color: white;
            text-align: center;
        }

        #videoContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        video {
            width: 350px;
            border-radius: 10px;
            border: 2px solid #00ffcc;
        }
    </style>
</head>
<body>

<h2>👩‍🏫 {{ classroom.title }} </h2>
<button onclick="detectEmotionAll()"
        style="padding:10px 20px; margin:20px; font-size:16px;">
    🎭 Detect Emotion
</button>

<button id="micBtn"
        style="padding:8px 16px; margin:10px; font-size:14px;">
    🎤 Mute
</button>

<div id="videoContainer"></div>

<script>

console.log("Teacher room script loaded");

function detectEmotionAll() {

    const videos = document.querySelectorAll("video");

    videos.forEach(video => {

        if (video.muted) return;
        if (!video.videoWidth || !video.videoHeight) return;

        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = canvas.toDataURL("image/jpeg", 0.6);

        fetch("/detect_emotion/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ image: imageData })
        })
        .then(res => res.json())
        .then(data => {

            if (!data.emotion) return;

            const emojiMap = {
                happy: "😄",
                sad: "😢",
                angry: "😡",
                surprise: "😲",
                fear: "😨",
                disgust: "🤢",
                neutral: "😐"
            };

            let emotionLabel = video.parentElement.querySelector(".emotion-label");

            if (!emotionLabel) {
                emotionLabel = document.createElement("p");
                emotionLabel.classList.add("emotion-label");
                emotionLabel.style.color = "yellow";
                emotionLabel.style.fontWeight = "bold";
                emotionLabel.style.marginTop = "8px";
                video.parentElement.appendChild(emotionLabel);
            }

            emotionLabel.innerText = emojiMap[data.emotion] + " " + data.emotion;

        })
        .catch(err => console.log("Emotion error:", err));

    });

}


const classroomId = "{{ classroom.id }}";
const teacherUsername = "{{ request.user.username }}";

console.log("Classroom ID:", classroomId);

const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";

const socket = new WebSocket(
    protocol + window.location.host + "/ws/classroom/" + classroomId + "/"
);


socket.onopen = () => {
    console.log("WebSocket connected");
};

socket.onerror = (error) => {
    console.log("WebSocket error:", error);
};

socket.onclose = () => {
    console.log("WebSocket closed");
};


const videoContainer = document.getElementById("videoContainer");

let localStream;
let peerConnections = {};
let pendingStudents = [];
let pendingIceCandidates = {};

const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        {
            urls: "turn:openrelay.metered.ca:80",
            username: "openrelayproject",
            credential: "openrelayproject"
        },
        {
            urls: "turn:openrelay.metered.ca:443",
            username: "openrelayproject",
            credential: "openrelayproject"
        }
    ]
};


function renderStudentVideo(student, stream) {
    let video = document.getElementById("video_" + student);

    if (!video) {
        const wrapper = document.createElement("div");
        wrapper.innerHTML = "<h4>🎓 " + student + "</h4>";

        const kickBtn = document.createElement("button");
        kickBtn.innerText = "❌ Kick";
        kickBtn.style.backgroundColor = "red";
        kickBtn.style.color = "white";
        kickBtn.style.border = "none";
        kickBtn.style.padding = "5px 10px";
        kickBtn.style.cursor = "pointer";
        kickBtn.style.marginBottom = "8px";
        kickBtn.onclick = () => kickStudent(student);

        video = document.createElement("video");
        video.id = "video_" + student;
        video.autoplay = true;
        video.playsInline = true;
        video.width = 300;

        wrapper.appendChild(kickBtn);
        wrapper.appendChild(video);
        videoContainer.appendChild(wrapper);
    }

    if (video.srcObject !== stream) {
        video.srcObject = stream;
    }
}


async function createPeerConnectionForStudent(student) {

    if (!student) return;

    if (!localStream) {
        if (!pendingStudents.includes(student)) {
            pendingStudents.push(student);
        }
        return;
    }

    if (peerConnections[student]) {
        console.log("Already connected to", student);
        return;
    }

    const pc = new RTCPeerConnection(config);
    peerConnections[student] = pc;
    pendingIceCandidates[student] = [];

    pc.oniceconnectionstatechange = () => {
        console.log("ICE state for", student, ":", pc.iceConnectionState);
    };

    pc.onconnectionstatechange = () => {
        console.log("Peer connection state for", student, ":", pc.connectionState);
    };

    localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
    });

    pc.ontrack = event => {
        const [remoteStream] = event.streams;
        if (remoteStream) {
            renderStudentVideo(student, remoteStream);
        }
    };

    pc.onicecandidate = event => {
        if (!event.candidate) return;

        console.log("Teacher sending ICE candidate to", student);

        socket.send(JSON.stringify({
            type: "candidate",
            candidate: event.candidate,
            sender: teacherUsername,
            target: student
        }));
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.send(JSON.stringify({
        type: "offer",
        offer: offer,
        sender: teacherUsername,
        target: student
    }));
}


navigator.mediaDevices.getUserMedia({ video: true, audio: true })
.then(stream => {

    console.log("Camera started");

    localStream = stream;

    const wrapper = document.createElement("div");
    wrapper.innerHTML = "<h4>🟢 {{ request.user.username }} (You)</h4>";

    const video = document.createElement("video");
    video.autoplay = true;
    video.muted = true;
    video.playsInline = true;
    video.width = 300;
    video.srcObject = stream;

    wrapper.appendChild(video);
    videoContainer.appendChild(wrapper);

    pendingStudents.splice(0).forEach(student => {
        createPeerConnectionForStudent(student);
    });

})
.catch(error => {
    console.log("Camera error:", error);
});


socket.onmessage = async function(event) {

    console.log("Raw message:", event.data);

    const data = JSON.parse(event.data);
    console.log("Received:", data.type, data.sender);

    if (data.type === "join") {
        await createPeerConnectionForStudent(data.sender);
    }

    if (data.type === "answer") {

        const student = data.sender;
        const pc = peerConnections[student];

        if (pc && pc.signalingState === "have-local-offer") {
            await pc.setRemoteDescription(
                new RTCSessionDescription(data.answer)
            );

            while (pendingIceCandidates[student] && pendingIceCandidates[student].length) {
                const candidate = pendingIceCandidates[student].shift();
                try {
                    await pc.addIceCandidate(new RTCIceCandidate(candidate));
                } catch (e) {
                    console.log("Teacher queued ICE error:", e);
                }
            }
        }

    }

    if (data.type === "candidate") {

        const student = data.sender;
        const pc = peerConnections[student];

        if (pc) {
            if (!pc.remoteDescription) {
                if (!pendingIceCandidates[student]) {
                    pendingIceCandidates[student] = [];
                }
                pendingIceCandidates[student].push(data.candidate);
                return;
            }

            try {
                await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            } catch (e) {
                console.log("ICE error:", e);
            }
        }

    }

};


function kickStudent(username) {

    fetch("/kick_student/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username: username })
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === "kicked") {

            alert(username + " has been kicked.");

            const video = document.getElementById("video_" + username);

            if (video) {
                video.parentElement.remove();
            }

            socket.send(JSON.stringify({
                type: "kicked",
                target: username
            }));
        }

    });

}


const micBtn = document.getElementById("micBtn");

let isMuted = false;

micBtn.onclick = () => {

    if (!localStream) return;

    localStream.getAudioTracks().forEach(track => {
        track.enabled = isMuted;
    });

    isMuted = !isMuted;

    micBtn.innerText = isMuted ? "🔊 Unmute" : "🎤 Mute";

};

</script>

</body>
</html>
