<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Emotion Classroom - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #667eea, #764ba2, #6a11cb, #2575fc);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Animated Background */
@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Glass Card */
.login-card {
    width: 400px;
    padding: 45px;
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    color: white;
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(-30px);}
    to {opacity: 1; transform: translateY(0);}
}

.title {
    text-align: center;
    margin-bottom: 35px;
}

.title h2 {
    font-weight: 700;
}

/* Line Input Style */
.input-group {
    position: relative;
    margin-bottom: 30px;
}

.form-control {
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(255,255,255,0.6);
    border-radius: 0;
    color: white;
    padding: 10px 35px;
    transition: 0.3s;
}

.form-control:focus {
    background: transparent;
    box-shadow: none;
    border-bottom: 2px solid #ffffff;
}

/* Floating Label */
.input-group label {
    position: absolute;
    left: 35px;
    top: 10px;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    transition: 0.3s;
    pointer-events: none;
}

.form-control:focus + label,
.form-control:not(:placeholder-shown) + label {
    top: -15px;
    font-size: 12px;
    color: #ffffff;
}

/* Icons */
.icon-left {
    position: absolute;
    left: 5px;
    top: 12px;
    color: white;
}

.toggle-password {
    position: absolute;
    right: 5px;
    top: 12px;
    cursor: pointer;
    color: white;
}

/* Button */
.btn-login {
    border-radius: 50px;
    height: 45px;
    font-weight: 600;
    background: linear-gradient(90deg, #ffffff, #f3f3f3);
    color: #764ba2;
    border: none;
    transition: 0.4s;
}

.btn-login:hover {
    background: linear-gradient(90deg, #6a11cb, #2575fc);
    color: white;
    transform: scale(1.05);
}

.extra-links {
    text-align: center;
    margin-top: 20px;
}

.extra-links a {
    color: white;
    font-size: 14px;
    text-decoration: none;
}

.extra-links a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="login-card">

    <div class="title">
        <h2>🤖 AI Emotion Classroom</h2>
        <p>Login to Continue</p>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="input-group">
            <i class="fas fa-user icon-left"></i>
            <input type="text" name="username" id="id_username" class="form-control" placeholder=" " required>
            <label>Username</label>
        </div>

        <div class="input-group">
            <i class="fas fa-lock icon-left"></i>
            <input type="password" name="password" id="id_password" class="form-control" placeholder=" " required>
            <label>Password</label>
            <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
        </div>

        <button type="submit" class="btn btn-login w-100">Login</button>
    </form>

    <div class="extra-links">
        <a href="{% url 'student_register' %}">Register as Student</a>
    </div>

</div>

<script>
function togglePassword() {
    const passwordField = document.getElementById("id_password");
    const icon = document.querySelector(".toggle-password");

    if (passwordField.type === "password") {
        passwordField.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        passwordField.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>

</body>
</html>
